spring.application.name=user

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/app_medicao?schema=app
spring.r2dbc.username=marcelo
spring.r2dbc.password=AnosMaisTarde

server.port=8087
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ConfiguraÓÐo de inicializaÓÐo de SQL
spring.sql.init.mode=always

# ConfiguraÓÐo para registrar o serviÓo no Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ConfiguraÓÐo de logging para depuraÓÐo
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
logging.level.reactor.netty=DEBUG
logging.level.security=DEBUG
logging.level.org.springframework.r2dbc.core=DEBUG
logging.level.io.r2dbc.postgresql.QUERY=DEBUG

spring.main.allow-bean-definition-overriding=true
